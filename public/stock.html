<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock 🥫 · Tomo Family Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--text2:#8b949e;--blue:#1f6feb;--green:#3fb950;--red:#f85149;--yellow:#d29922;--hover:#1c2128}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden}
.card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.card-header:hover{background:var(--hover)}
.card-body{padding:0 16px 16px}
.item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item-name{flex:1;cursor:pointer;font-size:14px;line-height:1.3}
.item-name:hover{color:var(--blue)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:600;white-space:nowrap}
.badge-green{background:#3fb95022;color:var(--green);border:1px solid #3fb95044}
.badge-yellow{background:#d2992222;color:var(--yellow);border:1px solid #d2992244}
.badge-red{background:#f8514922;color:var(--red);border:1px solid #f8514944}
.qty-controls{display:flex;align-items:center;gap:4px}
.qty-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.qty-btn:hover{background:var(--hover);border-color:var(--blue)}
.qty-btn:active{transform:scale(.92)}
.qty-value{font-size:15px;font-weight:700;min-width:32px;text-align:center;color:var(--text)}
.unit-label{font-size:12px;color:var(--text2);margin-left:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.modal input,.modal select{width:100%;padding:10px 12px;background:#0d1117;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:12px;outline:none}
.modal input:focus,.modal select:focus{border-color:var(--blue)}
.modal-actions{display:flex;gap:8px;margin-top:8px}
.modal-actions button{flex:1;padding:10px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:var(--hover);color:var(--text)}
.btn-add{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(31,111,235,.4);display:flex;align-items:center;justify-content:center;z-index:40;transition:.2s}
.btn-add:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(31,111,235,.5)}
.btn-add:active{transform:scale(.95)}
.section-count{font-size:12px;color:var(--text2);background:var(--hover);padding:2px 8px;border-radius:12px}
.empty{text-align:center;padding:32px;color:var(--text2);font-size:14px}
.chevron{transition:transform .2s;font-size:12px;color:var(--text2)}
.chevron.open{transform:rotate(180deg)}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.error{background:var(--red)}
.toast-show{opacity:1!important}
</style>
</head>
<body>

<div id="toast"></div>

<div class="max-w-lg mx-auto px-4 py-5">
  <div class="flex items-center justify-between mb-5">
    <h1 class="text-xl font-bold">🥫 Stock</h1>
    <button onclick="openAdd()" class="text-sm text-[var(--blue)] hover:underline font-medium">+ Baru</button>
  </div>
  <div id="app"></div>
</div>

<button class="btn-add" onclick="openAdd()">+</button>

<div id="modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">Tambah Item</h3>
    <input id="fName" placeholder="Nama item" autocomplete="off">
    <select id="fCategory">
      <option value="Makanan">🍚 Makanan</option>
      <option value="Sanitasi">🧴 Sanitasi</option>
      <option value="Lainnya">📦 Lainnya</option>
    </select>
    <div class="flex gap-2">
      <input id="fQty" type="number" step="any" min="0" placeholder="Jumlah" style="flex:1">
      <input id="fUnit" placeholder="Unit (kg, pcs...)" style="flex:1">
    </div>
    <input id="fMin" type="number" step="any" min="0" placeholder="Min stok">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Batal</button>
      <button id="btnSave" class="btn-primary" onclick="saveItem()">Simpan</button>
    </div>
    <button id="btnDelete" class="btn-danger" style="display:none;margin-top:8px;width:100%" onclick="deleteItem()">Hapus</button>
  </div>
</div>

<script>
const CATEGORIES = ['Makanan','Sanitasi','Lainnya']
const CAT_ICON = {Makanan:'🍚',Sanitasi:'🧴',Lainnya:'📦'}
const STATUS = {green:'🟢 Cukup',yellow:'🟡 Menipis',red:'🔴 Habis'}

let stock = [], editingId = null

function toast(msg, err) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.className = err ? 'error' : ''; t.classList.add('toast-show')
  setTimeout(() => t.classList.remove('toast-show'), 2000)
}

// WS
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:'
  const ws = new WebSocket(`${proto}//${location.host}/ws/stock`)
  ws.onmessage = (e) => {
    try { const d = JSON.parse(e.data); if (d && d.type === 'stock') fetchStock() } catch(_) {}
  }
  ws.onclose = () => setTimeout(connectWS, 2000)
}
connectWS()

// API
async function fetchStock() {
  const r = await fetch('/api/stock')
  const d = await r.json()
  stock = d.data || []
  render()
}

async function addItem(data) {
  const r = await fetch('/api/stock', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) })
  if (!r.ok) throw new Error('Gagal simpan')
  await fetchStock()
}

async function updateItem(id, data) {
  const r = await fetch(`/api/stock/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) })
  if (!r.ok) throw new Error('Gagal update')
  await fetchStock()
}

async function deleteItem(id) {
  editingId = id
  if (!confirm('Hapus item ini?')) return
  const r = await fetch(`/api/stock/${id}`, { method:'DELETE' })
  if (!r.ok) throw new Error('Gagal hapus')
  closeModal()
  await fetchStock()
  toast('Item dihapus')
}

async function adjust(id, delta) {
  const r = await fetch(`/api/stock/${id}/adjust`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({delta}) })
  if (!r.ok) { toast('Gagal adjust', true); return }
  const d = await r.json()
  const idx = stock.findIndex(s => s.id === id)
  if (idx >= 0) stock[idx] = d.data
  render()
}

// Modal
function openAdd() {
  editingId = null
  document.getElementById('modalTitle').textContent = 'Tambah Item'
  document.getElementById('fName').value = ''
  document.getElementById('fCategory').value = 'Makanan'
  document.getElementById('fQty').value = ''
  document.getElementById('fUnit').value = ''
  document.getElementById('fMin').value = ''
  document.getElementById('btnSave').textContent = 'Simpan'
  document.getElementById('btnDelete').style.display = 'none'
  document.getElementById('modal').style.display = 'flex'
  setTimeout(() => document.getElementById('fName').focus(), 100)
}

function openEdit(item) {
  editingId = item.id
  document.getElementById('modalTitle').textContent = 'Edit Item'
  document.getElementById('fName').value = item.name
  document.getElementById('fCategory').value = item.category
  document.getElementById('fQty').value = item.current_qty
  document.getElementById('fUnit').value = item.unit
  document.getElementById('fMin').value = item.min_threshold
  document.getElementById('btnSave').textContent = 'Update'
  document.getElementById('btnDelete').style.display = 'block'
  document.getElementById('modal').style.display = 'flex'
  setTimeout(() => document.getElementById('fName').focus(), 100)
}

function closeModal() {
  document.getElementById('modal').style.display = 'none'
  editingId = null
}

async function saveItem() {
  const name = document.getElementById('fName').value.trim()
  if (!name) { toast('Nama item harus diisi', true); return }
  const data = {
    name,
    category: document.getElementById('fCategory').value,
    current_qty: parseFloat(document.getElementById('fQty').value) || 0,
    unit: document.getElementById('fUnit').value.trim() || 'pcs',
    min_threshold: parseFloat(document.getElementById('fMin').value) || 1,
  }
  try {
    if (editingId) {
      await updateItem(editingId, data)
      toast('Item diupdate')
    } else {
      await addItem(data)
      toast('Item ditambahkan')
    }
    closeModal()
  } catch(e) {
    toast(e.message||'Gagal', true)
  }
}

async function deleteItem() {
  if (editingId && confirm('Hapus item ini?')) {
    const r = await fetch(`/api/stock/${editingId}`, { method:'DELETE' })
    if (!r.ok) { toast('Gagal hapus', true); return }
    closeModal()
    await fetchStock()
    toast('Item dihapus')
  }
}

// Render
function render() {
  const grouped = {}
  for (const item of stock) {
    if (!grouped[item.category]) grouped[item.category] = []
    grouped[item.category].push(item)
  }

  let html = ''
  for (const cat of CATEGORIES) {
    const items = grouped[cat] || []
    if (items.length === 0) continue
    const total = items.length
    const low = items.filter(i => i.status !== 'green').length
    const headerClass = low > 0 ? 'text-[var(--yellow)]' : ''
    html += `<div class="card">
      <div class="card-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.chevron').classList.toggle('open')">
        <div><span class="font-semibold text-sm">${CAT_ICON[cat]} ${cat}</span> <span class="section-count">${total} item${low?`, ${low} menipis`:''}</span></div>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">`
    for (const item of items) {
      const s = item.status || 'green'
      const statusText = STATUS[s] || '🟢 Cukup'
      html += `<div class="item">
        <div class="item-name" onclick="openEdit(${JSON.stringify(item).replace(/"/g,'&quot;')})">${item.name}</div>
        <div class="badge badge-${s}">${statusText}</div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="adjust(${item.id},-1)" title="Kurangi">−</button>
          <span class="qty-value">${item.current_qty}</span>
          <button class="qty-btn" onclick="adjust(${item.id},1)" title="Tambah">+</button>
        </div>
        <span class="unit-label">${item.unit}</span>
      </div>`
    }
    html += `</div></div>`
  }

  if (!html) html = '<div class="empty">Belum ada item stok. Klik + untuk tambah.</div>'
  document.getElementById('app').innerHTML = html
}

fetchStock()
</script>
</body>
</html>
