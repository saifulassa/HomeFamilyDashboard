<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomo Family Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#1f6feb',
            success: '#3fb950',
            danger: '#f85149',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#f8f9fa] dark:bg-[#0d1117] text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <header class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold">🏠 Tomo Family Hub</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Family Dashboard</p>
      </div>
      <div class="text-right">
        <div id="clock" class="text-lg font-mono">--:--:--</div>
        <div id="date" class="text-xs text-gray-400"></div>
      </div>
    </header>

    <main>
      <div class="text-center py-20">
        <div class="text-6xl mb-4">🚧</div>
        <h2 class="text-xl font-semibold mb-2">Coming Soon</h2>
        <p class="text-gray-500 dark:text-gray-400">Modules will appear here</p>
      </div>
    </main>

    <footer class="text-center text-xs text-gray-400 mt-8">
      Tomo Family Hub &mdash; Local Network Only
    </footer>
  </div>

  <script>
    function updateClock() {
      const now = new Date()
      const wib = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Jakarta' }))
      document.getElementById('clock').textContent = wib.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
      document.getElementById('date').textContent = wib.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
    }
    updateClock()
    setInterval(updateClock, 1000)
  </script>
</body>
</html>
