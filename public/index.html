<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomo Family Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#1f6feb',
            success: '#3fb950',
            danger: '#f85149',
            canvas: 'var(--color-canvas)',
            card: 'var(--color-card)',
            border: 'var(--color-border)',
            text: 'var(--color-text)',
            muted: 'var(--color-muted)',
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --color-canvas: #f8f9fa;
      --color-card: #ffffff;
      --color-border: #dee2e6;
      --color-text: #212529;
      --color-muted: #6c757d;
      --color-header-bg: #ffffff;
      --color-card-hover: #f1f3f5;
      --color-clock-bg: #e9ecef;
      --color-toggle-bg: #e9ecef;
      --color-toggle-icon: #495057;
      --clock-shadow: 0 1px 3px rgba(0,0,0,0.06);
    }

    [data-theme="dark"] {
      --color-canvas: #0d1117;
      --color-card: #161b22;
      --color-border: #30363d;
      --color-text: #c9d1d9;
      --color-muted: #8b949e;
      --color-header-bg: #161b22;
      --color-card-hover: #1c2128;
      --color-clock-bg: #0d1117;
      --color-toggle-bg: #21262d;
      --color-toggle-icon: #8b949e;
      --clock-shadow: none;
    }

    body {
      background: var(--color-canvas);
      color: var(--color-text);
      transition: background .3s, color .3s;
      min-height: 100vh;
    }

    .card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 1.25rem;
      transition: background .2s, border-color .2s, transform .15s;
    }
    .card:hover {
      background: var(--color-card-hover);
      border-color: var(--color-border);
      transform: translateY(-2px);
    }

    .header-bg {
      background: var(--color-header-bg);
      border-bottom: 1px solid var(--color-border);
      transition: background .3s;
    }

    .clock-bg {
      background: var(--color-clock-bg);
      box-shadow: var(--clock-shadow);
    }

    .toggle-btn {
      background: var(--color-toggle-bg);
      color: var(--color-toggle-icon);
      border: 1px solid var(--color-border);
      transition: background .2s;
    }
    .toggle-btn:hover {
      background: var(--color-border);
    }

    .module-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .grid-cards {
      display: grid;
      grid-template-columns: repeat(1, 1fr);
      gap: 1rem;
    }
    @media (min-width: 768px) {
      .grid-cards { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .grid-cards { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header-bg sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-white font-bold text-sm">T</div>
        <span class="font-semibold hidden sm:inline">Tomo Family Hub</span>
      </div>
      <div class="flex items-center gap-4">
        <div class="clock-bg px-3 py-1.5 rounded-lg font-mono text-sm tabular-nums" id="clock">--:--:--</div>
        <button id="themeToggle" class="toggle-btn w-8 h-8 rounded-lg flex items-center justify-center text-sm" title="Ganti tema">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-6xl mx-auto px-4 py-6">
    <!-- Greeting -->
    <div class="mb-6">
      <h2 class="text-lg font-semibold" id="greeting">Selamat datang</h2>
      <p class="text-sm text-muted" id="dateDisplay"></p>
    </div>

    <!-- Module Grid -->
    <div class="grid-cards" id="modules">
      <!-- Cards injected by JS -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center text-xs text-muted pb-6">
    Tomo Family Hub &mdash; Local Network Only
  </footer>

  <script>
    // --- Module definitions ---
    const MODULES = [
      { id: 'agenda',   label: 'Agenda',     icon: 'fa-calendar-days',  color: '#1f6feb', desc: 'Jadwal keluarga 4 hari ke depan' },
      { id: 'checklist',label: 'Checklist',  icon: 'fa-list-check',    color: '#3fb950', desc: 'Daftar tugas & pekerjaan rumah' },
      { id: 'stock',    label: 'Stok',       icon: 'fa-boxes-stacked', color: '#d29922', desc: 'Stok dapur & belanja bulanan' },
      { id: 'memo',     label: 'Memo',       icon: 'fa-sticky-note',   color: '#db6d28', desc: 'Catatan cepat keluarga' },
      { id: 'health',   label: 'Kesehatan',  icon: 'fa-heart-pulse',   color: '#f85149', desc: 'Tekanan darah, berat badan, olahraga' },
      { id: 'habits',   label: 'Kebiasaan',  icon: 'fa-check-circle', color: '#bc8cff', desc: 'Tracker kebiasaan harian' },
    ]

    // --- Render cards ---
    function renderCards() {
      const container = document.getElementById('modules')
      container.innerHTML = MODULES.map(m => `
        <div class="card cursor-pointer" data-module="${m.id}">
          <div class="flex items-start gap-3">
            <div class="module-icon" style="background:${m.color}20;color:${m.color}">
              <i class="fas ${m.icon}"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="font-semibold text-sm">${m.label}</h3>
              <p class="text-xs text-muted mt-0.5">${m.desc}</p>
            </div>
            <i class="fas fa-chevron-right text-muted text-xs mt-1.5"></i>
          </div>
        </div>
      `).join('')
    }
    renderCards()

    // --- Theme ---
    const STORAGE_KEY = 'tomo-theme'

    function getDefaultTheme() {
      const hour = new Date().toLocaleString('en-US', { timeZone: 'Asia/Jakarta', hour: '2-digit', hour12: false })
      const h = parseInt(hour, 10)
      return (h >= 18 || h < 6) ? 'dark' : 'light'
    }

    function setTheme(theme, persist = true) {
      document.documentElement.setAttribute('data-theme', theme)
      if (theme === 'dark') {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
      const icon = document.getElementById('themeIcon')
      icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon'
      if (persist) localStorage.setItem(STORAGE_KEY, theme)
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme')
      setTheme(current === 'dark' ? 'light' : 'dark')
    }

    // Init theme: saved preference > auto
    const saved = localStorage.getItem(STORAGE_KEY)
    if (saved) {
      setTheme(saved)
    } else {
      setTheme(getDefaultTheme(), false)
    }

    // Auto-switch at 18:00 / 06:00
    function scheduleAutoTheme() {
      const now = new Date()
      const wibParts = now.toLocaleString('en-US', { timeZone: 'Asia/Jakarta', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).split(':')
      const currentSec = parseInt(wibParts[0], 10) * 3600 + parseInt(wibParts[1], 10) * 60 + parseInt(wibParts[2], 10)

      const saved = localStorage.getItem(STORAGE_KEY)
      const useAuto = saved === null

      if (useAuto) {
        setTheme(getDefaultTheme(), false)
      }

      // Check every minute
      setInterval(() => {
        if (localStorage.getItem(STORAGE_KEY) === null) {
          setTheme(getDefaultTheme(), false)
        }
      }, 60000)
    }
    scheduleAutoTheme()

    document.getElementById('themeToggle').addEventListener('click', toggleTheme)

    // --- Clock ---
    function pad(n) { return String(n).padStart(2, '0') }

    function updateClock() {
      const now = new Date()
      const wib = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Jakarta' }))
      document.getElementById('clock').textContent =
        `${pad(wib.getHours())}:${pad(wib.getMinutes())}:${pad(wib.getSeconds())}`

      const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu']
      const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember']
      document.getElementById('dateDisplay').textContent =
        `${days[wib.getDay()]}, ${wib.getDate()} ${months[wib.getMonth()]} ${wib.getFullYear()}`

      const h = wib.getHours()
      let greet = 'Selamat malam'
      if (h >= 4 && h < 11) greet = 'Selamat pagi'
      else if (h >= 11 && h < 15) greet = 'Selamat siang'
      else if (h >= 15 && h < 18) greet = 'Selamat sore'
      document.getElementById('greeting').textContent = `👋 ${greet}`
    }
    updateClock()
    setInterval(updateClock, 1000)

    // --- Card click (placeholder) ---
    document.getElementById('modules').addEventListener('click', (e) => {
      const card = e.target.closest('.card')
      if (card) {
        const module = card.dataset.module
        const label = MODULES.find(m => m.id === module)?.label || module
        if (module === 'agenda') { window.location.href = '/agenda.html'; return }
        if (module === 'checklist') { window.location.href = '/checklist.html'; return }
        if (module === 'stock') { window.location.href = '/stock.html'; return }
        if (module === 'memo') { window.location.href = '/memo.html'; return }
        alert(`🔧 ${label} — coming soon di phase selanjutnya`)
      }
    })
  </script>
</body>
</html>
