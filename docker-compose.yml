services:
  app:
    build: .
    container_name: tomo-family-hub
    ports:
      - "127.0.0.1:3002:3001"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Jakarta
      - PORT=3001
      - CRON_SECRET=${CRON_SECRET:-cron-secret-change-me}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3001/api/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
